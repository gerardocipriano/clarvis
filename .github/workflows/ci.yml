name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: lint & test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest ruff

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest (pure logic, no audio/D-Bus needed)
        run: pytest -q

  shell:
    name: shellcheck installers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
